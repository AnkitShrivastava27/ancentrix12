# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - Astricvoicebackend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: astriccontainer.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8D6A39B0339D43FFBD6687A53A445909 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_686DDDBF3C11423EAA67F086D06FA474 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: astriccontainer.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8D6A39B0339D43FFBD6687A53A445909 }}/astriccontainerimage:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6E80412AAC1D47258B02F28AD5CB4D23 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_599BF274AE9F4EE19414C370FD70C0BA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_73910215D117449EA4A5A308310EC476 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'Astricvoicebackend'
          slot-name: 'Production'
          images: 'astriccontainer.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8D6A39B0339D43FFBD6687A53A445909 }}/astriccontainerimage:${{ github.sha }}'
          