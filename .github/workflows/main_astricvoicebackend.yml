# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - Astricvoicebackend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: astriccontainer.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2C12A1CCC536493E87AD1610AD4AFC8D }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_681CBCFC88D847B49EF2694EC8309B3D }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: astriccontainer.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2C12A1CCC536493E87AD1610AD4AFC8D }}/astricbackendimage:${{ github.sha }}
          

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C13BFC98217E426D9FEB11B46D587467 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D28118E30BCC4AE4A5C285709EAFDFFE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_39926F594CD84726A351F1E9FA502408 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'Astricvoicebackend'
          slot-name: 'Production'
          images: 'astriccontainer.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2C12A1CCC536493E87AD1610AD4AFC8D }}/astricbackendimage:${{ github.sha }}'
          
